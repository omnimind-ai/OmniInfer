name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  control-plane-check:
    name: Control Plane Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Linux release helper tests
        run: python -m unittest tests.test_linux_release_backends -v
